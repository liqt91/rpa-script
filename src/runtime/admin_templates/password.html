{% extends "base.html" %}

{% block title %}修改密码{% endblock %}

{% block content %}
<div class="p-8 max-w-xl">
  <div class="mb-6">
    <h2 class="text-2xl font-bold text-white">修改密码</h2>
    <p class="text-gray-400 mt-1">更新当前账户的登录密码</p>
  </div>

  {% if success %}
  <div class="mb-4 p-3 bg-green-900/30 border border-green-700 rounded-lg text-green-300 text-sm">
    密码修改成功
  </div>
  {% endif %}

  {% if error %}
  <div class="mb-4 p-3 bg-red-900/30 border border-red-700 rounded-lg text-red-300 text-sm">
    {{ error }}
  </div>
  {% endif %}

  <div class="bg-gray-800 rounded-xl border border-gray-700 p-6">
    <form method="post" action="/admin/password" class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-gray-300 mb-2">原密码</label>
        <input type="password" name="old_password" required
               class="w-full px-4 py-2.5 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-300 mb-2">新密码</label>
        <input type="password" name="new_password" required minlength="6"
               class="w-full px-4 py-2.5 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
        <p class="text-xs text-gray-500 mt-1">至少 6 位字符</p>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-300 mb-2">确认新密码</label>
        <input type="password" name="confirm_password" required minlength="6"
               class="w-full px-4 py-2.5 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
      </div>
      <div class="pt-2">
        <button type="submit"
                class="px-6 py-2.5 bg-blue-600 hover:bg-blue-500 text-white font-medium rounded-lg transition-colors">
          保存修改
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
