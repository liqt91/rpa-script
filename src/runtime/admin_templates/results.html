{% extends "base.html" %}
{% block title %}结果查看{% endblock %}
{% block content %}
<div class="p-8">
  <h1 class="text-2xl font-bold text-white mb-6">结果查看</h1>

  <div class="bg-gray-800 rounded-lg border border-gray-700 overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-gray-700 text-gray-300">
        <tr>
          <th class="px-4 py-3 text-left">ID</th>
          <th class="px-4 py-3 text-left">任务ID</th>
          <th class="px-4 py-3 text-left">URL</th>
          <th class="px-4 py-3 text-left">总数</th>
          <th class="px-4 py-3 text-left">客户端</th>
          <th class="px-4 py-3 text-left">采集时间</th>
        </tr>
      </thead>
      <tbody id="resultTable" class="text-gray-300"></tbody>
    </table>
    <div id="resultPagination" class="px-4 py-3 border-t border-gray-700 flex justify-between items-center"></div>
  </div>
</div>

<script>
function getToken() {
  const m = document.cookie.match(/access_token=([^;]+)/);
  return m ? m[1] : '';
}

async function loadResults(page) {
  const r = await fetch(`/api/results?page=${page}&per_page=20`, {headers: {'Authorization': 'Bearer ' + getToken()}});
  const data = await r.json();

  const tbody = document.getElementById('resultTable');
  tbody.innerHTML = data.items.map(item => `
    <tr class="border-t border-gray-700 hover:bg-gray-700/50">
      <td class="px-4 py-3"><a href="/admin/results/${item.id}" class="text-blue-400 hover:underline">#${item.id}</a></td>
      <td class="px-4 py-3">${item.task_id || '-'}</td>
      <td class="px-4 py-3 truncate max-w-xs" title="${item.url}">${item.url}</td>
      <td class="px-4 py-3">${item.total}</td>
      <td class="px-4 py-3 text-gray-400">${item.client_id || '-'}</td>
      <td class="px-4 py-3 text-gray-400 text-xs">${item.extract_time ? item.extract_time.replace('T',' ').substring(0,19) : '-'}</td>
    </tr>
  `).join('') || '<tr><td colspan="6" class="px-4 py-8 text-center text-gray-500">暂无结果</td></tr>';

  const pag = document.getElementById('resultPagination');
  pag.innerHTML = `
    <span class="text-gray-400 text-sm">共 ${data.total} 条，第 ${data.page}/${data.pages} 页</span>
    <div class="flex gap-2">
      <button onclick="loadResults(${data.page - 1})" ${data.page <= 1 ? 'disabled' : ''} class="px-3 py-1 bg-gray-700 rounded text-sm disabled:opacity-50">上一页</button>
      <button onclick="loadResults(${data.page + 1})" ${data.page >= data.pages ? 'disabled' : ''} class="px-3 py-1 bg-gray-700 rounded text-sm disabled:opacity-50">下一页</button>
    </div>`;
}

loadResults(1);
</script>
{% endblock %}
