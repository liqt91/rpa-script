{% extends "base.html" %}
{% block title %}工作流编排{% endblock %}
{% block content %}
<div class="p-8 max-w-6xl mx-auto">
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold text-white">工作流编排</h1>
    <button onclick="showCreateForm()" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 text-white rounded-lg transition-colors">
      + 创建工作流
    </button>
  </div>

  <!-- 创建工作流表单 -->
  <div id="createForm" class="hidden bg-gray-800 rounded-lg border border-gray-700 p-6 mb-6">
    <h3 class="text-lg font-medium text-white mb-4">创建新工作流</h3>
    <form id="createWorkflowForm" class="space-y-4">
      <div>
        <label class="block text-sm text-gray-300 mb-1">名称</label>
        <input type="text" name="name" required placeholder="小红书搜索采集"
               class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white">
      </div>
      <div>
        <label class="block text-sm text-gray-300 mb-1">描述</label>
        <input type="text" name="description" placeholder="简要描述工作流用途"
               class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white">
      </div>
      <div>
        <label class="block text-sm text-gray-300 mb-1">目标页面 URL</label>
        <input type="text" name="url" placeholder="https://www.xiaohongshu.com/explore/xxx"
               class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white">
      </div>
      <div class="flex gap-3">
        <button type="submit" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 text-white rounded-lg">创建</button>
        <button type="button" onclick="hideCreateForm()" class="px-4 py-2 bg-gray-600 hover:bg-gray-500 text-white rounded-lg">取消</button>
      </div>
    </form>
  </div>

  <!-- 工作流列表 -->
  <div id="workflowList" class="space-y-4"></div>
</div>

<script>
const API_BASE = '/api/workflows';

async function loadWorkflows() {
  const res = await fetch(API_BASE);
  const data = await res.json();
  const container = document.getElementById('workflowList');
  if (!data.length) {
    container.innerHTML = '<div class="text-gray-500 text-center py-12">暂无工作流，点击右上角创建</div>';
    return;
  }
  container.innerHTML = data.map(wf => `
    <div class="bg-gray-800 rounded-lg border border-gray-700 p-5">
      <div class="flex items-center justify-between">
        <div>
          <h3 class="text-lg font-medium text-white">${esc(wf.name)}</h3>
          <p class="text-sm text-gray-400 mt-1">${esc(wf.description || '无描述')}</p>
          <div class="flex gap-4 mt-2 text-xs text-gray-500">
            <span>框架: ${esc(wf.framework)}</span>
            ${wf.url ? `<span>URL: <a href="${esc(wf.url)}" target="_blank" class="text-blue-400 hover:underline">${esc(wf.url.slice(0, 60))}</a></span>` : ''}
            <span>${new Date(wf.created_at).toLocaleString()}</span>
          </div>
        </div>
        <div class="flex gap-2">
          <a href="/admin/workflows/${wf.id}/edit" class="px-3 py-1.5 bg-blue-600 hover:bg-blue-500 text-white text-sm rounded">编辑</a>
          <button onclick="exportPython(${wf.id})" class="px-3 py-1.5 bg-green-600 hover:bg-green-500 text-white text-sm rounded">导出 Python</button>
          <button onclick="deleteWorkflow(${wf.id})" class="px-3 py-1.5 bg-red-600 hover:bg-red-500 text-white text-sm rounded">删除</button>
        </div>
      </div>
    </div>
  `).join('');
}

function showCreateForm() {
  document.getElementById('createForm').classList.remove('hidden');
}
function hideCreateForm() {
  document.getElementById('createForm').classList.add('hidden');
}

document.getElementById('createWorkflowForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const payload = {
    name: fd.get('name'),
    description: fd.get('description') || '',
    url: fd.get('url') || '',
  };
  const res = await fetch(API_BASE, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(payload),
  });
  if (res.ok) {
    hideCreateForm();
    e.target.reset();
    loadWorkflows();
  } else {
    const err = await res.json();
    alert('创建失败: ' + (err.detail || '未知错误'));
  }
});

async function deleteWorkflow(id) {
  if (!confirm('确定删除该工作流？此操作不可恢复。')) return;
  const res = await fetch(`${API_BASE}/${id}`, {method: 'DELETE'});
  if (res.ok) loadWorkflows();
}

async function exportPython(id) {
  const res = await fetch(`${API_BASE}/${id}/export/python`);
  const data = await res.json();
  if (data.success) {
    await navigator.clipboard.writeText(data.python);
    alert('Python 脚本已复制到剪贴板');
  }
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

loadWorkflows();
</script>
{% endblock %}
