<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RPA 元素编辑器</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    font-size: 13px;
    color: #333;
    background: #fff;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Scrollable content */
  .scrollable { flex: 1; overflow-y: auto; min-height: 0; }

  /* Section block */
  .section {
    border-bottom: 1px solid #e8e8e8; padding: 10px 14px;
  }
  .section-title {
    font-size: 12px; font-weight: 600; color: #666; margin-bottom: 6px;
  }

  /* Workflow select */
  .workflow-row {
    display: flex; align-items: center; gap: 8px; padding: 10px 14px;
    border-bottom: 1px solid #e8e8e8; background: #f0f7ff;
  }
  .workflow-row label { font-size: 12px; color: #666; width: 40px; flex-shrink: 0; }
  .conn-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    background: #ff4d4f; transition: background 0.3s;
    cursor: pointer;
  }
  .conn-dot.online { background: #52c41a; }
  .conn-dot.checking { background: #faad14; }
  .workflow-row select {
    flex: 1; padding: 5px 8px; border: 1px solid #d9d9d9; border-radius: 4px; font-size: 13px; background: #fff;
  }

  /* Name input */
  .name-row {
    display: flex; align-items: center; gap: 8px; padding: 10px 14px;
    border-bottom: 1px solid #e8e8e8;
  }
  .name-row label { font-size: 12px; color: #666; width: 60px; flex-shrink: 0; }
  .name-row input {
    flex: 1; padding: 5px 8px; border: 1px solid #d9d9d9; border-radius: 4px; font-size: 13px;
  }

  /* Screenshot */
  .screenshot-box {
    max-height: 140px; overflow: hidden; border-radius: 4px; border: 1px solid #e8e8e8;
    display: flex; align-items: center; justify-content: center; background: #f5f5f5;
    margin: 0 14px 10px;
  }
  .screenshot-box img { max-width: 100%; max-height: 140px; display: block; }

  /* Tabs */
  .tabs {
    display: flex; gap: 4px; padding: 8px 14px 0; border-bottom: 1px solid #e8e8e8;
    background: #fafafa;
  }
  .tab {
    padding: 6px 12px; border: none; background: transparent; cursor: pointer;
    font-size: 13px; color: #666; border-bottom: 2px solid transparent; margin-bottom: -1px;
  }
  .tab.active { color: #1677ff; border-bottom-color: #1677ff; font-weight: 500; }

  /* Candidates */
  .candidates-list {
    display: flex; flex-direction: column; gap: 2px;
    max-height: 78px; overflow-y: auto;
  }

  /* DOM tree */
  .dom-panel {
    max-height: 164px; overflow-y: auto;
    background: #fafafa; border-radius: 4px; border: 1px solid #e8e8e8;
    padding: 6px 0;
  }
  .dom-item {
    display: flex; align-items: center; gap: 6px; padding: 5px 10px;
    cursor: pointer; font-family: monospace; font-size: 12px;
    min-width: 0;
  }
  .dom-item:hover { background: #f0f0f0; }
  .dom-item.active { background: #e6f7ff; }
  .dom-item input[type="checkbox"] { margin: 0; }
  .dom-tag { color: #d73a49; white-space: nowrap; flex-shrink: 0; }
  .dom-indent { display: inline-block; flex-shrink: 0; }
  .dom-preview {
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    flex: 1; min-width: 0; color: #888; font-size: 11px; margin-left: 4px;
  }

  /* Properties */
  .prop-panel {
    max-height: 208px; overflow-y: auto;
    background: #fafafa; border-radius: 4px; border: 1px solid #e8e8e8;
    padding: 8px;
  }
  .prop-section { margin-bottom: 12px; }
  .prop-section-title {
    font-size: 12px; font-weight: 600; color: #666; margin-bottom: 6px;
  }
  .prop-row {
    display: flex; align-items: center; gap: 6px; padding: 5px 6px;
    border-radius: 4px; margin-bottom: 2px;
  }
  .prop-row:hover { background: #f5f5f5; }
  .prop-row input[type="checkbox"] { margin: 0; }
  .prop-name { width: 80px; font-size: 12px; color: #333; font-family: monospace; flex-shrink: 0; }
  .prop-match {
    width: 80px; padding: 3px 4px; border: 1px solid #d9d9d9; border-radius: 4px;
    font-size: 12px; background: #fff; color: #333; flex-shrink: 0;
  }
  .prop-value {
    flex: 1; padding: 3px 6px; border: 1px solid #d9d9d9; border-radius: 4px;
    font-size: 12px; font-family: monospace; background: #fff; min-width: 0;
  }
  .prop-value:disabled { background: #f5f5f5; color: #999; }

  /* Selector preview */
  .preview-bar {
    padding: 10px 14px; border-top: 1px solid #e8e8e8; background: #fafafa;
    flex-shrink: 0;
  }
  .preview-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
  .preview-label { font-size: 12px; color: #666; width: 60px; flex-shrink: 0; margin-top: 6px; }
  .preview-input {
    flex: 1; padding: 5px 8px; border: 1px solid #d9d9d9; border-radius: 4px;
    font-size: 12px; font-family: monospace; background: #fff;
    resize: vertical; min-height: 60px;
  }
  .preview-meta { font-size: 11px; color: #888; margin-left: 68px; }
  .preview-meta.ok { color: #52c41a; }
  .preview-meta.err { color: #ff4d4f; }

  /* Footer */
  .footer {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; border-top: 1px solid #e8e8e8; background: #fafafa;
    flex-shrink: 0;
  }
  .footer-left { display: flex; align-items: center; gap: 8px; }
  .footer-right { display: flex; gap: 8px; }
  .btn {
    padding: 5px 14px; border: 1px solid #d9d9d9; border-radius: 4px;
    font-size: 13px; cursor: pointer; background: #fff; color: #333;
  }
  .btn:hover { border-color: #1677ff; color: #1677ff; }
  .btn-primary {
    background: #1677ff; border-color: #1677ff; color: #fff;
  }
  .btn-primary:hover { background: #4096ff; border-color: #4096ff; }
  .btn-ghost { border: none; background: transparent; }

  /* Loading overlay */
  .loading-overlay {
    position: fixed; inset: 0;
    background: rgba(255,255,255,0.96);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 999;
  }
  .loading-overlay.hidden { display: none !important; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-spinner {
    width: 32px; height: 32px;
    border: 3px solid #e8e8e8; border-top-color: #1677ff; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  .loading-text { margin-top: 10px; font-size: 13px; color: #666; }

  /* Hidden */
  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- Loading overlay -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">正在分析元素...</div>
</div>

<!-- Scrollable content -->
<div class="scrollable">
  <!-- Workflow select -->
  <div class="workflow-row">
    <label>环境</label>
    <select id="envSelect" style="flex:0 0 80px;">
      <option value="8811">生产</option>
      <option value="8000">开发</option>
    </select>
    <div id="connDot" class="conn-dot" title="未连接"></div>
    <label style="width:40px;margin-left:8px;">流程</label>
    <select id="workflowSelect">
      <option value="">选择流程...</option>
    </select>
  </div>

  <!-- Element name -->
  <div class="name-row">
    <label>元素名称</label>
    <input type="text" id="elName" placeholder="输入元素名称">
  </div>

  <!-- Screenshot -->
  <div class="screenshot-box" id="screenshotBox">
    <span style="color:#999;font-size:12px;">暂无截图</span>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" data-tab="xpath-single">XPath-单个</button>
    <button class="tab" data-tab="xpath-list">XPath-列表</button>
    <button class="tab" data-tab="css-single">CSS-单个</button>
    <button class="tab" data-tab="css-list">CSS-列表</button>
    <button class="tab" data-tab="drission">Drission</button>
  </div>

  <!-- Candidates -->
  <div class="section">
    <div class="section-title">推荐方案</div>
    <div class="candidates-list" id="candidatesList"></div>
  </div>

  <!-- DOM tree -->
  <div class="section">
    <div class="section-title">页面层级</div>
    <div class="dom-panel" id="domPanel"></div>
  </div>

  <!-- Properties -->
  <div class="section">
    <div class="section-title">元素属性</div>
    <div class="prop-panel" id="propPanel"></div>
  </div>
</div>

<!-- Selector preview -->
<div class="preview-bar">
  <div class="preview-row" style="gap:8px;flex-wrap:wrap;">
    <span class="preview-label">选择器</span>
    <textarea class="preview-input" id="selectorPreview" rows="3" readonly style="flex:1 1 100%;"></textarea>
    <div style="display:flex;gap:8px;align-items:center;">
      <span class="preview-label" style="white-space:nowrap;">目标模式</span>
      <select id="targetMode" style="flex:1;padding:4px 6px;border:1px solid #d9d9d9;border-radius:4px;font-size:12px;">
        <option value="single">单个元素</option>
        <option value="list">元素列表</option>
      </select>
    </div>
  </div>
  <div class="preview-meta" id="verifyResult">点击"校验元素"查看匹配结果</div>

  <!-- Loop-relative anchoring (capture-time). Hidden unless the element was anchored. -->
  <div class="preview-row" id="anchorBox" style="display:none;flex-direction:column;gap:6px;margin-top:8px;border-top:1px dashed #e0e0e0;padding-top:8px;">
    <div style="display:flex;align-items:center;gap:6px;">
      <input type="checkbox" id="useRelativeChk" checked style="margin:0;">
      <label for="useRelativeChk" class="preview-label" style="cursor:pointer;white-space:nowrap;">循环内相对解析</label>
      <span class="preview-meta" id="anchorMode" style="margin-left:auto;">自动</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <span class="preview-label" style="white-space:nowrap;">循环项锚点</span>
      <input type="text" id="anchorSelectorInput" readonly style="flex:1;padding:4px 6px;border:1px solid #eee;border-radius:4px;font-size:11px;background:#fafafa;color:#666;">
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <span class="preview-label" style="white-space:nowrap;">相对选择器</span>
      <input type="text" id="relativeSelectorInput" placeholder="如 css:.author 或 xpath:./div/span" style="flex:1;padding:4px 6px;border:1px solid #d9d9d9;border-radius:4px;font-size:11px;">
    </div>
  </div>
</div>

<!-- Footer -->
<div class="footer">
  <div class="footer-left">
    <button class="btn" id="btnVerify">校验元素</button>
  </div>
  <div class="footer-right">
    <button class="btn btn-ghost" id="btnCancel">取消</button>
    <button class="btn btn-primary" id="btnSave">保存</button>
  </div>
</div>

<script src="sidepanel.js"></script>
</body>
</html>
