<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 260px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 13px;
            background: #1e1e1e;
            color: #d4d4d4;
        }
        .header {
            padding: 12px 16px;
            background: #2d2d2d;
            border-bottom: 1px solid #444;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .header h1 { font-size: 14px; font-weight: 600; }
        .status {
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            display: inline-block; margin-right: 6px;
        }
        .status-dot.on { background: #4caf50; box-shadow: 0 0 4px #4caf50; }
        .status-dot.off { background: #666; }
        .btn {
            width: calc(100% - 32px);
            margin: 6px 16px;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.85; }
        .btn-primary { background: #4a6a8a; color: #fff; }
        .btn-success { background: #4a6a4a; color: #fff; }
        .btn-danger  { background: #5a2a2a; color: #ff8888; }
        .btn-secondary { background: #3c3c3c; color: #d4d4d4; }
        .divider { height: 1px; background: #333; margin: 8px 16px; }
        .stats { padding: 0 16px 10px; font-size: 11px; color: #888; }
        .stats span { color: #ce9178; }
        .footer {
            padding: 8px 16px;
            text-align: center;
            font-size: 11px;
            color: #555;
            border-top: 1px solid #333;
        }
    </style>
</head>
<body>
    <div class="header">
        <span style="font-size:16px">&#127909;</span>
        <h1>操作编排器</h1>
    </div>

    <div class="status">
        <span id="status-text"><span class="status-dot off" id="status-dot"></span>未启动</span>
    </div>

    <div class="stats">
        步骤: <span id="step-count">0</span> | 元素库: <span id="lib-count">0</span>
    </div>

    <!-- 认证区域 -->
    <div id="auth-section" style="padding: 8px 16px; border-bottom: 1px solid #333;">
        <div id="auth-logged-out">
            <label style="display:block;color:#888;font-size:11px;margin-bottom:3px">登录后端</label>
            <input id="auth-username" type="text" placeholder="用户名" value="admin"
                   style="width:100%;background:#2a2a2a;border:1px solid #444;color:#d4d4d4;border-radius:4px;padding:4px 6px;font-size:11px;box-sizing:border-box;margin-bottom:4px">
            <input id="auth-password" type="password" placeholder="密码" value="admin123"
                   style="width:100%;background:#2a2a2a;border:1px solid #444;color:#d4d4d4;border-radius:4px;padding:4px 6px;font-size:11px;box-sizing:border-box;margin-bottom:4px">
            <button id="btn-login" class="btn btn-primary" style="width:auto;margin:0;padding:4px 12px;font-size:11px">登录</button>
        </div>
        <div id="auth-logged-in" style="display:none">
            <div style="display:flex;justify-content:space-between;align-items:center">
                <span style="color:#4caf50;font-size:11px">&#128274; 已登录: <span id="auth-username-display">admin</span></span>
                <button id="btn-logout" class="btn btn-secondary" style="width:auto;margin:0;padding:2px 8px;font-size:10px">登出</button>
            </div>
        </div>
    </div>

    <!-- 后端配置 -->
    <div style="padding: 8px 16px; border-bottom: 1px solid #333;">
        <label style="display:block;color:#888;font-size:11px;margin-bottom:3px">后端地址</label>
        <input id="backend-url" type="text" value="http://localhost:8000"
               style="width:100%;background:#2a2a2a;border:1px solid #444;color:#ce9178;border-radius:4px;padding:4px 6px;font-size:11px;font-family:monospace;box-sizing:border-box">
        <div style="display:flex;gap:6px;margin-top:6px">
            <select id="workflow-select"
                    style="flex:1;background:#2a2a2a;border:1px solid #444;color:#d4d4d4;border-radius:4px;padding:4px 6px;font-size:11px">
                <option value="">-- 选择工作流 --</option>
            </select>
            <button id="btn-refresh-wf" class="btn btn-secondary" style="width:auto;margin:0;padding:4px 8px;font-size:11px">刷新</button>
        </div>
    </div>

    <button class="btn btn-success" id="btn-toggle">&#128308; 启动面板</button>
    <button class="btn btn-primary" id="btn-export-json">&#128203; 导出 JSON</button>
    <button class="btn btn-primary" id="btn-export-nl">&#128221; 导出自然语言</button>

    <div class="divider"></div>

    <button class="btn btn-secondary" id="btn-clear-steps">&#128465; 清空步骤</button>
    <button class="btn btn-danger" id="btn-clear-all">&#128683; 清空全部数据</button>

    <div class="footer">
        快捷键: Ctrl+Shift+O 切换面板<br>
        启动后按住 Alt + 鼠标 hover/click 录入步骤
    </div>

    <script src="popup.js"></script>
</body>
</html>
